<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="60%" stop-color="#141414"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#f5d97a" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#f5d97a" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="flame" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d4b76a" stop-opacity="0"/>
      <stop offset="50%" stop-color="#d4b76a" stop-opacity="0"/>
      <stop offset="50%" stop-color="#d4b76a" stop-opacity="1"/>
      <stop offset="100%" stop-color="#f5d97a" stop-opacity="1"/>
    </linearGradient>
    <linearGradient id="goldText" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f5d97a"/>
      <stop offset="100%" stop-color="#d4b76a"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Border gold subtle -->
  <rect
    x="20" y="20" width="1160" height="590"
    fill="none"
    stroke="#d4b76a"
    stroke-opacity="0.25"
    stroke-width="2"
    rx="20"
  />

  <!-- Flame logo big -->
  <g transform="translate(140, 200)">
    <path
      d="M120 20 C 80 50, 60 80, 60 120 C 60 160, 90 220, 120 220 C 150 220, 180 160, 180 120 C 180 80, 160 50, 120 20 Z"
      fill="url(#flame)"
      stroke="#d4b76a"
      stroke-width="3"
      stroke-linejoin="round"
    />
    <circle cx="120" cy="32" r="6" fill="#f5d97a"/>
  </g>

  <!-- Wordmark + tagline -->
  <g transform="translate(380, 200)">
    <text
      x="0" y="120"
      font-family="'Cormorant Garamond', 'Times New Roman', serif"
      font-size="180"
      font-weight="600"
      fill="url(#goldText)"
      letter-spacing="-2"
    >
      RiffLab
    </text>
    <text
      x="6" y="200"
      font-family="'Inter', system-ui, sans-serif"
      font-size="34"
      font-weight="500"
      fill="#9a9a9a"
    >
      Le carnet du guitariste moderne
    </text>
    <text
      x="6" y="252"
      font-family="'JetBrains Mono', monospace"
      font-size="20"
      font-weight="500"
      fill="#d4b76a"
      letter-spacing="2"
    >
      ACCORDS · GAMMES · TUNER · PRATIQUE QUOTIDIENNE
    </text>
  </g>

  <!-- Bottom mark -->
  <text
    x="600" y="580"
    text-anchor="middle"
    font-family="'Inter', system-ui, sans-serif"
    font-size="18"
    font-weight="400"
    fill="#6a6a6a"
  >
    rifflab.app · PWA mobile-first · open source
  </text>
</svg>
