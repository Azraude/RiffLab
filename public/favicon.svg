<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="6" fill="#0a0a0a"/>
  <defs>
    <mask id="flame-half">
      <rect x="0" y="15.5" width="32" height="17" fill="white"/>
    </mask>
  </defs>
  <!-- Flame outline (uniformément or sur toute la silhouette) -->
  <path
    d="M16 4 C 12 8, 10 12, 11 17 C 11 22, 13.5 28, 16 28 C 18.5 28, 21 22, 21 17 C 22 12, 20 8, 16 4 Z"
    fill="none"
    stroke="#d4b76a"
    stroke-width="2"
    stroke-linejoin="round"
  />
  <!-- Bottom half filled gold -->
  <path
    d="M16 4 C 12 8, 10 12, 11 17 C 11 22, 13.5 28, 16 28 C 18.5 28, 21 22, 21 17 C 22 12, 20 8, 16 4 Z"
    fill="#d4b76a"
    mask="url(#flame-half)"
  />
  <!-- Top spark -->
  <circle cx="16" cy="5.5" r="1" fill="#f5d97a"/>
</svg>
